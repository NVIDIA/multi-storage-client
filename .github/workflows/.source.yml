#
# GitHub Actions workflow configuration.
#
# https://docs.github.com/en/actions/writing-workflows/workflow-syntax-for-github-actions
#

name: Source
on:
  workflow_call:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
defaults:
  run:
    shell: nix develop --command bash -e {0}
jobs:
  nix:
    name: nix
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      # Checkout.
      - uses: actions/checkout@v6
      # Install Nix + Magic Nix Cache.
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          summarize: false
      - uses: DeterminateSystems/magic-nix-cache-action@main
      # Main.
      - working-directory: nix
        run: |
          just build
  multi-storage-explorer:
    name: multi-storage-explorer
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      # Checkout.
      - uses: actions/checkout@v6
      # Install Nix + Magic Nix Cache.
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          summarize: false
      - uses: DeterminateSystems/magic-nix-cache-action@main
      # Main.
      - working-directory: multi-storage-explorer
        run: |
          just build
  multi-storage-client:
    name: multi-storage-client
    permissions:
      contents: read
    strategy:
      matrix:
        python-binary:
          - python3.10
          - python3.11
          - python3.12
          - python3.13
      fail-fast: false
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: nix develop ${{ github.workspace }}#"\"${{ matrix.python-binary }}\"" --command bash -e {0}
    steps:
      # Checkout.
      - uses: actions/checkout@v6
      # Install Nix + Magic Nix Cache.
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          summarize: false
      - uses: DeterminateSystems/magic-nix-cache-action@main
      # Install uv + enable uv caching.
      #
      # The Nix shell provides uv so this is only for uv caching.
      - uses: astral-sh/setup-uv@v8.0.0
        env:
          UV_NO_MODIFY_PATH: true
        with:
          cache-suffix: multi-storage-client
          enable-cache: true
      # Main.
      - working-directory: multi-storage-explorer
        run: |
          just bundle
      - working-directory: multi-storage-client
        run: |
          just python-binary=${{ matrix.python-binary }} build
          just python-binary=${{ matrix.python-binary }} run-minimal-verification
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ github.job }} (${{ matrix.python-binary }})
          path: |
            -
            multi-storage-client/.reports/unit/coverage/
            multi-storage-client/dist/
  multi-storage-client-docs:
    name: multi-storage-client-docs
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      # Checkout.
      - uses: actions/checkout@v6
      # Install Nix + Magic Nix Cache.
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          summarize: false
      - uses: DeterminateSystems/magic-nix-cache-action@main
      # Install uv + enable uv caching.
      #
      # The Nix shell provides uv so this is only for uv caching.
      - uses: astral-sh/setup-uv@v8.0.0
        env:
          UV_NO_MODIFY_PATH: true
        with:
          cache-suffix: multi-storage-client-docs
          enable-cache: true
      # Main.
      - working-directory: multi-storage-client-docs
        run: |
          just build
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ github.job }}
          path: |
            -
            multi-storage-client-docs/dist/
  multi-storage-client-scripts:
    name: multi-storage-client-scripts
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      # Checkout.
      - uses: actions/checkout@v6
      # Install Nix + Magic Nix Cache.
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          summarize: false
      - uses: DeterminateSystems/magic-nix-cache-action@main
      # Install uv + enable uv caching.
      #
      # The Nix shell provides uv so this is only for uv caching.
      - uses: astral-sh/setup-uv@v8.0.0
        env:
          UV_NO_MODIFY_PATH: true
        with:
          cache-suffix: multi-storage-client-scripts
          enable-cache: true
      # Main.
      - working-directory: multi-storage-client-scripts
        run: |
          just build
  multi-storage-file-system:
    name: multi-storage-file-system
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      # Checkout.
      - uses: actions/checkout@v6
      # Install Nix + Magic Nix Cache.
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          summarize: false
      - uses: DeterminateSystems/magic-nix-cache-action@main
      # Main.
      - working-directory: multi-storage-file-system
        run: |
          just build
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ github.job }}
          path: |
            -
            multi-storage-file-system/build/debian/archives/*.deb
            multi-storage-file-system/build/rpm/RPMS/*/*.rpm
            multi-storage-file-system/build/tar/*.tar.*
            multi-storage-file-system/build/zip/*.zip
  validate-release:
    name: Validate Release
    needs:
      - nix
      - multi-storage-explorer
      - multi-storage-client
      - multi-storage-client-docs
      - multi-storage-client-scripts
      - multi-storage-file-system
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      # Checkout.
      - uses: actions/checkout@v6
      # Install Nix + Magic Nix Cache.
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          summarize: false
      - uses: DeterminateSystems/magic-nix-cache-action@main
      # Install uv + enable uv caching.
      #
      # The Nix shell provides uv so this is only for uv caching.
      - uses: astral-sh/setup-uv@v8.0.0
        env:
          UV_NO_MODIFY_PATH: true
        with:
          cache-suffix: multi-storage-client-scripts
          enable-cache: true
      # Main.
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true
      - working-directory: multi-storage-client-scripts
        run: |
          uv run msc-scripts release --github-token ${{ secrets.GITHUB_TOKEN }} --phase validate
