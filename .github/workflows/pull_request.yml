#
# GitHub Actions workflow configuration.
#
# https://docs.github.com/en/actions/writing-workflows/workflow-syntax-for-github-actions
#

name: Pull Request
on:
  push:
    branches:
      - pull-request/[0-9]+
jobs:
  source:
    name: Source
    permissions:
      contents: read
    uses: ./.github/workflows/.source.yml
  status-check:
    name: ${{ github.workflow }} Status Check
    needs:
      - source
    if: ${{ always() }}
    permissions:
      statuses: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            github.rest.repos.createCommitStatus({
              ...context.repo,
              // The branch ruleset's required status check name must match the workflow name.
              context: context.workflow,
              sha: context.sha,
              state: ${{ toJSON(needs.*.result) }}.every(status => status == 'success') ? 'success' : 'error',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}?pr=${context.ref.match(/^refs\/heads\/pull-request\/(\d+)$/)[1]}`
            })
