apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "msfs-csi.fullname" . }}-node
  labels:
    {{- include "msfs-csi.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "msfs-csi.fullname" . }}-node
  labels:
    {{- include "msfs-csi.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "msfs-csi.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "msfs-csi.fullname" . }}-node
  apiGroup: rbac.authorization.k8s.io
