apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: msfs-csi-node
  namespace: msfs
  labels:
    app.kubernetes.io/name: msfs-csi-node
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: msfs-csi-node
  template:
    metadata:
      labels:
        app.kubernetes.io/name: msfs-csi-node
    spec:
      serviceAccountName: msfs-csi-node
      # imagePullSecrets is only needed if your image is in a private registry.
      # imagePullSecrets:
      #   - name: <your-image-pull-secret>
      containers:
        - name: msfs-csi-driver
          image: <your-registry>/msfs-csi:latest
          args:
            - "--endpoint=unix:///csi/csi.sock"
            - "--v=4"
          securityContext:
            privileged: true
            capabilities:
              add: ["SYS_ADMIN"]
          volumeMounts:
            - name: plugin-dir
              mountPath: /csi
            - name: pods-mount-dir
              mountPath: /var/lib/kubelet/pods
              mountPropagation: Bidirectional
            - name: fuse-device
              mountPath: /dev/fuse
        - name: node-driver-registrar
          image: registry.k8s.io/sig-storage/csi-node-driver-registrar:v2.12.0
          args:
            - "--csi-address=/csi/csi.sock"
            - "--kubelet-registration-path=/var/lib/kubelet/plugins/msfs.csi.nvidia.com/csi.sock"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: plugin-dir
              mountPath: /csi
            - name: registration-dir
              mountPath: /registration
      volumes:
        - name: plugin-dir
          hostPath:
            path: /var/lib/kubelet/plugins/msfs.csi.nvidia.com
            type: DirectoryOrCreate
        - name: pods-mount-dir
          hostPath:
            path: /var/lib/kubelet/pods
            type: Directory
        - name: registration-dir
          hostPath:
            path: /var/lib/kubelet/plugins_registry
            type: DirectoryOrCreate
        - name: fuse-device
          hostPath:
            path: /dev/fuse
            type: CharDevice
