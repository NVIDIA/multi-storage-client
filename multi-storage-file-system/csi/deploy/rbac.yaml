apiVersion: v1
kind: ServiceAccount
metadata:
  name: msfs-csi-node
  namespace: msfs
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: msfs-csi-node
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: msfs-csi-node
subjects:
  - kind: ServiceAccount
    name: msfs-csi-node
    namespace: msfs
roleRef:
  kind: ClusterRole
  name: msfs-csi-node
  apiGroup: rbac.authorization.k8s.io
