cache:
  size: 20G
  use_etag: true
  eviction_policy:
    policy: fifo
    refresh_interval: 300
  cache_backend:
    cache_path: /tmp/msc_cache
opentelemetry:
  metrics:
    attributes:
      # All environments.
      - type: static
        options:
          attributes:
            msc.ppp: Multi-Storage Client
            msc.job: unknown
            msc.job_nodes: 1
            msc.job_gpus: 0
            msc.cluster: CI/CD
            msc.node_gpus: 0
      - type: host
        options:
          attributes:
            msc.node: name
      - type: process
        options:
          attributes:
            msc.process: pid
      - type: msc_config
        options:
          attributes:
            msc.azure_client_id:
              expression: opentelemetry.metrics.exporter.options.auth.client_id
            msc.azure_client_credential:
              expression: hash('sha3-224', opentelemetry.metrics.exporter.options.auth.client_credential)
      # Progressive enhancement for local environments.
      - type: environment_variables
        options:
          attributes:
            msc.job_user: USER
      # Progressive enhancement for GitLab CI/CD environments.
      #
      # https://docs.gitlab.com/ci/variables/predefined_variables
      - type: environment_variables
        options:
          attributes:
            msc.job: CI_JOB_ID
            msc.job_user: GITLAB_USER_LOGIN
      # Progressive enhancement for GitHub Actions environments.
      #
      # https://docs.github.com/en/actions/reference/workflows-and-actions/variables
      - type: environment_variables
        options:
          attributes:
            msc.job: GITHUB_RUN_ID
            msc.job_user: GITHUB_TRIGGERING_ACTOR
    reader:
      options:
        collect_interval_millis: 10
        collect_timeout_millis: 100
        export_interval_millis: 1000
        export_timeout_millis: 500
    exporter:
      type: _otlp_msal
      options:
        auth:
          client_id: ${PANOPTES_CLIENT_ID}
          client_credential: ${PANOPTES_CLIENT_CREDENTIAL}
          scopes:
            - api://dgxc-lgtm-otel-gateway-prod/.default
          authority: https://login.microsoftonline.com/43083d15-7273-40c1-b7db-39efd9ccc17a
        exporter:
          endpoint: https://otel-metrics.us-west-2.aws.telemetry.dgxc.ngc.nvidia.com/v1/metrics
